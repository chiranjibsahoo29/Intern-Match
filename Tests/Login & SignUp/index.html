<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Login & Signup</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div class="form-container">
            <!-- Login Form -->
            <div id="login" class="form-section active">
                <h2>Welcome Back!</h2>
                
                <div class="form-group">
                    <label for="loginEmail">Email Address *</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email address">
                    <div id="loginEmailError" class="error"></div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password *</label>
                    <input type="password" id="loginPassword" placeholder="Enter password">
                    <div id="loginPasswordError" class="error"></div>
                </div>

                <div class="g-recaptcha" data-sitekey="6LeOVu0rAAAAAMhqzWCnYnKzZ_MWPrEfKbJ4j6Jq"></div>
                <div id="loginCaptchaError" class="error"></div>
                <div id="loginError" class="error"></div>

                <button class="btn" onclick="handleLogin()">Login</button>
            </div>

            <!-- Signup Form -->
            <div id="signup" class="form-section">
                <h2>Create Account</h2>

                <div class="form-group">
                    <label for="signupEmail">Email Address *</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email address">
                    <div id="signupEmailError" class="error"></div>
                </div>

                <div class="form-group">
                    <label for="signupRegNo">University Registration Number *</label>
                    <input type="text" id="signupRegNo" placeholder="Enter registration number">
                    <div id="signupRegError" class="error"></div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password *</label>
                    <input type="password" id="signupPassword" placeholder="Create a strong password">
                    <div id="signupPasswordError" class="error"></div>
                </div>

                <div class="form-group">
                    <label for="signupPhone">Phone Number *</label>
                    <input type="tel" id="signupPhone" placeholder="Enter 10-digit phone number" maxlength="10">
                    <div id="signupPhoneError" class="error"></div>
                </div>

                <div class="g-recaptcha" data-sitekey="6LeOVu0rAAAAAMhqzWCnYnKzZ_MWPrEfKbJ4j6Jq"></div>
                <div id="signupCaptchaError" class="error"></div>
                <div id="signupError" class="error"></div>

                <button class="btn" onclick="handleSignup()">Create Account</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
