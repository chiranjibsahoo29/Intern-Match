<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Dashboard</title>
    <link rel="stylesheet" href="profile-page.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="profile-header">
                <!-- Default Profile Photo -->
                <div class="profile-photo"></div>
                <h3>User Name</h3>
            </div>
            <div class="sidebar-menu">
                <!-- You can add menu items here -->
            </div>
            <!-- Sign Out Button -->
            <div class="signout-container">
                <button class="signout-btn" onclick="signOut()">Sign Out</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h1>My Profile</h1>
            </div>
            <div class="content-area">
                <h2>Edit Your Information</h2>
                <p>This is the space where you can add forms, text fields, and other elements to allow users to edit their profile details.</p>
                <!-- Add your editable form fields or other content here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
