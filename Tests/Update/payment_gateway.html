<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="x-icon/image" href="logo.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <link rel="stylesheet" href="payment_css_file.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PAYMENT GATEWAY</h1>
            <p>Powered By InternMatch</p>
        </div>

        <div class="payment-form">
            <form id="paymentForm">
                <div class="form-row">
                    <div class="form-section billing-section">
                        <h2>BILLING ADDRESS</h2>
                        
                        <div class="form-group">
                            <label for="fullName">Full Name :</label>
                            <input type="text" id="fullName" name="fullName" placeholder="Kumar Sahu" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email :</label>
                            <input type="email" id="email" name="email" placeholder="example@example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="address">Address :</label>
                            <input type="text" id="address" name="address" placeholder="room - street - locality" required>
                        </div>

                        <div class="form-group">
                            <label for="city">City :</label>
                            <input type="text" id="city" name="city" placeholder="Bhubaneswar" required>
                        </div>

                        <div class="form-group-row">
                            <div class="form-group">
                                <label for="state">District :</label>
                                <input type="text" id="state" name="state" placeholder="Ganjam" required>
                            </div>
                            <div class="form-group">
                                <label for="zipCode">Zip Code :</label>
                                <input type="text" id="zipCode" name="zipCode" placeholder="123456" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section payment-section">
                        <h2>PAYMENT</h2>
                        
                        <div class="form-group">
                            <label>Cards Accepted :</label>
                            <div class="card-icons">
                                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 32'%3E%3Crect fill='%23003087' width='48' height='32' rx='4'/%3E%3Ctext x='50%25' y='50%25' fill='white' font-family='Arial' font-size='14' font-weight='bold' text-anchor='middle' dominant-baseline='middle'%3EPayPal%3C/text%3E%3C/svg%3E" alt="PayPal">
                                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 32'%3E%3Crect fill='%23EB001B' width='24' height='32' rx='4'/%3E%3Crect fill='%23F79E1B' x='24' width='24' height='32' rx='4'/%3E%3Ccircle cx='24' cy='16' r='10' fill='%23FF5F00'/%3E%3C/svg%3E" alt="Mastercard">
                                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 32'%3E%3Crect fill='%23006FCF' width='48' height='32' rx='4'/%3E%3Ctext x='50%25' y='50%25' fill='white' font-family='Arial' font-size='10' font-weight='bold' text-anchor='middle' dominant-baseline='middle'%3EAMEX%3C/text%3E%3C/svg%3E" alt="American Express">
                                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 32'%3E%3Crect fill='%231A1F71' width='48' height='32' rx='4'/%3E%3Ctext x='50%25' y='50%25' fill='%23F7B600' font-family='Arial' font-size='14' font-weight='bold' text-anchor='middle' dominant-baseline='middle'%3EVISA%3C/text%3E%3C/svg%3E" alt="Visa">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="cardName">Name On Card :</label>
                            <input type="text" id="cardName" name="cardName" placeholder="Mr. Kumar Sahu" required>
                        </div>

                        <div class="form-group">
                            <label for="cardNumber">Credit Card Number :</label>
                            <input type="text" id="cardNumber" name="cardNumber" placeholder="1111 2222 3333 4444" maxlength="19" required>
                        </div>

                        <div class="form-group">
                            <label for="expMonth">Exp Month :</label>
                            <input type="number" id="expMonth" name="expMonth" placeholder="02" required>
                        </div>

                        <div class="form-group-row">
                            <div class="form-group">
                                <label for="expYear">Exp Year :</label>
                                <input type="number" id="expYear" name="expYear" placeholder="2022" required>
                            </div>
                            <div class="form-group">
                                <label for="cvv">CVV :</label>
                                <input type="number" id="cvv" name="cvv" placeholder="123" maxlength="3" required>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Proceed To Checkout</button>
            </form>
        </div>
    </div>

    <script src="payment_gateway.js"></script>
</body>
</html>
